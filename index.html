<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub to jsDelivr CDN Converter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .container {
            background: white; border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px; max-width: 700px; width: 100%;
        }
        h1 { text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; margin-bottom: 30px; color: #666; }
        input {
            width: 100%; padding: 15px;
            border-radius: 10px; border: 2px solid #e0e0e0;
            font-family: monospace;
        }
        .btn {
            width: 100%; padding: 15px; margin-top: 15px;
            background: #667eea; color: white;
            border: none; border-radius: 10px; cursor: pointer;
        }
        .result { margin-top: 20px; display: none; }
        .url-box {
            background: #f4f4f4; padding: 10px;
            border-radius: 8px; word-break: break-all;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 GitHub → CDN Tool</h1>
    <p class="subtitle">Smart jsDelivr Converter (Auto Fix Enabled)</p>

    <input id="githubUrl" placeholder="Paste GitHub or RAW URL here..." />
    <button class="btn" onclick="convertUrl()">Convert</button>

    <div class="result" id="result">
        <p><strong>⚠️ Exact Version:</strong></p>
        <div class="url-box" id="exact"></div>

        <p><strong>✅ Safe CDN (Recommended):</strong></p>
        <div class="url-box" id="safe"></div>

        <img id="preview" style="max-width:100%; margin-top:15px; display:none;" />
    </div>
</div>

<script>
function convertUrl() {
    const input = document.getElementById('githubUrl').value.trim();

    let username, repo, ref, filePath;

    let blob = input.match(/github\.com\/([^\/]+)\/([^\/]+)\/blob\/([^\/]+)\/(.+)/);
    let raw = input.match(/raw\.githubusercontent\.com\/([^\/]+)\/([^\/]+)\/([^\/]+)\/(.+)/);

    if (blob) {
        username = blob[1];
        repo = blob[2];
        ref = blob[3];
        filePath = blob[4];
    } else if (raw) {
        username = raw[1];
        repo = raw[2];
        ref = raw[3];
        filePath = raw[4];
    } else {
        alert("Invalid GitHub URL");
        return;
    }

    filePath = decodeURIComponent(filePath);

    let exact = `https://cdn.jsdelivr.net/gh/${username}/${repo}@${ref}/${filePath}`;
    let safe = `https://cdn.jsdelivr.net/gh/${username}/${repo}@main/${filePath}`;

    document.getElementById('exact').textContent = exact;
    document.getElementById('safe').textContent = safe;

    const preview = document.getElementById('preview');
    if (filePath.match(/\.(png|jpg|jpeg|gif|webp|svg)$/i)) {
        preview.src = safe;
        preview.style.display = 'block';
    } else {
        preview.style.display = 'none';
    }

    document.getElementById('result').style.display = 'block';
}
</script>

</body>
</html>
